services:
  nsaver:
    build: .
    container_name: nsaver
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: nsaver-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-nsaver_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-nsaver}
      MYSQL_USER: ${MYSQL_USER:-nsaver}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-nsaver_password}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mysql_data:
